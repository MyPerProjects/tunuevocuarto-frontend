<div class="form-container">
  <mat-card class="form-card mat-elevation-z4">
    <div class="form-header">
      <button mat-icon-button (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <h2>{{ isEditMode ? 'Actualizar Inquilino' : 'Nuevo Inquilino' }}</h2>
    </div>

    <form #tenantForm="ngForm" (ngSubmit)="saveTenant()" class="mobile-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombres</mat-label>
        <input
          matInput
          [(ngModel)]="tenant.firstName"
          name="firstName"
          required
          placeholder="Ej: Luis Diego"
        />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Apellidos</mat-label>
        <input
          matInput
          [(ngModel)]="tenant.lastName"
          name="lastName"
          required
          placeholder="Ej: Camus Dominguez"
        />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>DNI</mat-label>
        <input
          matInput
          [(ngModel)]="tenant.dni"
          name="dni"
          required
          maxlength="8"
          pattern="\d*"
          placeholder="8 dígitos obligatorios"
        />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Celular (WhatsApp)</mat-label>

        <span matPrefix class="peru-prefix">+51 &nbsp;</span>

        <input
          matInput
          [(ngModel)]="tenant.phoneNumber"
          name="phoneNumber"
          type="tel"
          required
          maxlength="9"
          pattern="9\d{8}"
          placeholder="987654321"
        />

        <mat-icon matSuffix color="primary">phone_iphone</mat-icon>
        <mat-hint>Solo los 9 dígitos del celular</mat-hint>
      </mat-form-field>

      <div class="form-actions">
        <button mat-stroked-button type="button" (click)="goBack()" class="btn-cancel">
          CANCELAR
        </button>
        <button mat-flat-button type="submit" class="btn-submit">
          <mat-icon>save</mat-icon> {{ isEditMode ? 'ACTUALIZAR' : 'REGISTRAR' }}
        </button>
      </div>
    </form>
  </mat-card>
</div>
