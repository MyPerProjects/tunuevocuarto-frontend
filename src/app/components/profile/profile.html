<div class="profile-container">
  <mat-card class="profile-card mat-elevation-z4">
    <mat-card-header>
      <mat-card-title>Mi Perfil</mat-card-title>
      <mat-card-subtitle>Gestiona tus datos personales y métodos de pago</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="profileForm" class="profile-form">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Nombre</mat-label>
            <input matInput formControlName="firstName" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Apellido</mat-label>
            <input matInput formControlName="lastName" />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo Electrónico</mat-label>
          <input matInput formControlName="email" />
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-divider style="margin: 20px 0"></mat-divider>

        <h3 class="section-title">Métodos de Cobro</h3>
        <p class="section-subtitle">
          Estos datos se incluirán automáticamente en los recordatorios de WhatsApp.
        </p>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Número de Yape</mat-label>
            <input matInput formControlName="yapeNumber" placeholder="999888777" maxlength="9" />
            <mat-icon matSuffix>phone_android</mat-icon>
            <mat-hint>9 dígitos</mat-hint>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Cuenta BCP (Opcional)</mat-label>
            <input matInput formControlName="bcpAccount" placeholder="191-..." />
            <mat-icon matSuffix>account_balance</mat-icon>
          </mat-form-field>
        </div>

        <div class="actions">
          <button
            mat-raised-button
            color="primary"
            [disabled]="profileForm.invalid || loading"
            (click)="saveChanges()"
          >
            <mat-icon *ngIf="!loading">save</mat-icon>
            {{ loading ? 'Guardando...' : 'Guardar Cambios' }}
          </button>
        </div>

        <div class="actions">
          <button mat-button color="warn" (click)="logout()">
            <mat-icon>logout</mat-icon>
            Cerrar Sesión
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
