<div class="list-wrapper">
  <div class="header-section">
    <h1>Padrón de Inquilinos</h1>
    <button mat-fab extended class="btn-limon-fab" (click)="goToCreate()">
      <mat-icon>add</mat-icon>
      Nuevo Inquilino
    </button>
  </div>

  <mat-card class="table-card mat-elevation-z3">
    <div class="responsive-table-container">
      <table mat-table [dataSource]="tenants" class="custom-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Inquilino</th>
          <td mat-cell *matCellDef="let tenant" class="font-bold-name">
            {{ tenant.firstName }} {{ tenant.lastName }}
          </td>
        </ng-container>

        <ng-container matColumnDef="dni">
          <th mat-header-cell *matHeaderCellDef>DNI</th>
          <td mat-cell *matCellDef="let tenant">{{ tenant.dni }}</td>
        </ng-container>

        <ng-container matColumnDef="phone">
          <th mat-header-cell *matHeaderCellDef>Teléfono</th>
          <td mat-cell *matCellDef="let tenant" class="phone-cell">{{ tenant.phoneNumber }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="text-center">Acciones</th>
          <td mat-cell *matCellDef="let tenant" class="text-center actions-cell">
            <button
              mat-icon-button
              class="btn-edit"
              (click)="goToEdit(tenant.id)"
              matTooltip="Editar datos"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              (click)="deleteTenant(tenant.id)"
              matTooltip="Eliminar de raíz"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <div *ngIf="tenants.length === 0" class="empty-state-text">
        No hay inquilinos registrados en el sistema.
      </div>
    </div>
  </mat-card>
</div>
